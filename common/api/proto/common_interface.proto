syntax = "proto3";

package common;

option go_package = "common/api/proto;common";

// Enum for processing result
enum ResultCode {
  ACCEPT = 0;   // Accept
  SUCCESS = 1;  // Success
  ERROR = 2;    // Error
}

// Error message structure
message ErrorMessage {
  int32 errorCode = 1;     // error code
  int32 detailCode = 2;    // detail code
  string message = 3;       // error code message
}
