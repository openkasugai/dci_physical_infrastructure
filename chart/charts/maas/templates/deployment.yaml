apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mychart.childName" (dict "Release" .Release "childChartName" "maas") }}-deployment
  labels:
    app: {{ include "mychart.childName" (dict "Release" .Release "childChartName" "maas") }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "mychart.childName" (dict "Release" .Release "childChartName" "maas") }}
  template:
    metadata:
      labels:
        app: {{ include "mychart.childName" (dict "Release" .Release "childChartName" "maas") }}
    spec:
      containers:
        - name: {{ include "mychart.childName" (dict "Release" .Release "childChartName" "maas") }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.config.serverPort }}
          envFrom:
            - configMapRef:
                name: {{ include "mychart.childName" (dict "Release" .Release "childChartName" "maas") }}-config
          env:
            - name: PRODUCT_MAPPINGS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-product-type-mappings
                  key: mappings.json
          volumeMounts:
            - name: ssh-keys
              mountPath: /etc/ssh-keys
              readOnly: true
          {{- if .Values.tls.enabled }}
            - name: tls-certs
              mountPath: {{ .Values.tls.certPath }}
              readOnly: true
          {{- end }}
      volumes:
        - name: ssh-keys
          secret:
            secretName: {{ .Values.ssh.secretName }}
            defaultMode: 0400
      {{- if .Values.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.secretName }}
      {{- end }}
