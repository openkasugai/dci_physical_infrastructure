apiVersion: v1
kind: Service
metadata:
  name: {{ include "mychart.childName" (dict "Release" .Release "childChartName" "maas") }}-service
spec:
  selector:
    app: {{ include "mychart.childName" (dict "Release" .Release "childChartName" "maas") }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.config.serverPort }}
  type: {{ .Values.service.type }}
