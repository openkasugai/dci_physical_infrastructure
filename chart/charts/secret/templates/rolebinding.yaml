{{- range $secretAccess := .Values.secretAccess }}
{{- range $sa := $.Values.serviceAccounts }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mychart.childName" (dict "Release" $.Release "childChartName" $sa.name) }}-read-{{ $secretAccess.secretName }}
  namespace: {{ $secretAccess.namespace }}
subjects:
- kind: ServiceAccount
  name: {{ include "mychart.childName" (dict "Release" $.Release "childChartName" $sa.name) }}-sa
  namespace: {{ $.Release.Namespace }}
roleRef:
  kind: Role
  name: {{ $.Release.Name }}-secret-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
