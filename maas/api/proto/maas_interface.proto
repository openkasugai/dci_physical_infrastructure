  repeated string cp_system_id    = 4 [(validate.rules).repeated = {min_items: 1, items: {string: {min_len: 1, max_len: 6}}}];    // system-id managed by MaaS For CP
}

// Response message for KubeadmJoin
message KubeadmJoinResponse {
  optional common.ResultCode result = 1;    // result of command (ACCEPT or ERROR)
  string error_message = 2;          // error message
}
