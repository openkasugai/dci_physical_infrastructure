  MaasInformation maas_info       = 2 [(validate.rules).message.required = true];            // MAAS information
  string system_id                = 3 [(validate.rules).string = {min_len: 1, max_len: 6}];  // system-id managed by MaaS
  optional string extra_parameter = 4;                                                       // Product extension parameters
}

// Response message for VmDelete
message VmDeleteResponse {
  optional common.ResultCode result = 1;    // result of command (ACCEPT or ERROR)
  string error_message = 2;          // error message
}

