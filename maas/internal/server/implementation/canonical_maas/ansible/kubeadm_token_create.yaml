- hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: Check if kubeadm is installed
      command: which kubeadm
      register: kubeadm_check
      failed_when: false
      changed_when: false

    - name: Fail if kubeadm is not installed
      fail:
        msg: "kubeadm is not installed on this node"
      when: kubeadm_check.rc != 0

    - name: Generate new kubeadm join token
      command: kubeadm token create --print-join-command
      register: join_command_output

    - name: Set join command fact
      set_fact:
        kubeadm_join_command: "{{ join_command_output.stdout | trim }}"

    - name: Display join command
      debug:
        msg: "KUBEADM_JOIN_COMMAND={{ kubeadm_join_command }}"
