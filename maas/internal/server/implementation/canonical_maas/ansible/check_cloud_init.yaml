- hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: check cloud-init status
      command: cloud-init status
      register: cloud_init_result
      failed_when: false
      changed_when: false

    - name: output cloud-init status result
      debug:
        msg: "CLOUD_INIT_STATUS={{ cloud_init_result.stdout }}"
