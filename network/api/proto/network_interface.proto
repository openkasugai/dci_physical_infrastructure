syntax = "proto3";

package protonetwork;

import "validate/validate.proto";
import "common/api/proto/common_interface.proto";

// Package for go
option go_package = "network_module/api/proto;protonetwork";

// Enum for detail error code
enum DetailCode {
  ZERO = 0;
	IF_PARAMETER_INVALID = 41;
	UNSUPPORT_PRODUCT    = 42;
	NW_ENVIRONMENT_ERROR = 61;
	NW_COMMAND_ERROR     = 71;
	VSW_VLAN_DUPLICATE   = 73;
	VSW_VLAN_NOTFOUND    = 74;
}

// Define service for network
service Network {
  rpc VlanAdd (VlanAddRequest) returns (VlanAddReply) {}
  rpc VlanDelete (VlanDeleteRequest) returns (VlanDeleteReply) {}
  rpc VswVlanAdd (VswVlanAddRequest) returns (VswVlanAddReply) {}
  rpc VswVlanDelete (VswVlanDeleteRequest) returns (VswVlanDeleteReply) {}
}

// message of Product information
message ProductInformation {
  string vendor       = 1 [(validate.rules).string = {min_len: 1, max_len: 128}];   // vendor name
  string product_name = 2 [(validate.rules).string = {min_len: 1, max_len: 128}];   // product name
  string version      = 3 [(validate.rules).string = {min_len: 1, max_len: 128}];   // version
  optional string os  = 4 [(validate.rules).string = {min_len: 1, max_len: 128}];   // os info
}

// message of network information
message NwInformation {
  string remote_host      = 1 [(validate.rules).string = {min_len: 1, max_len: 128}];   // host name or ip address
  string remote_user      = 2 [(validate.rules).string = {min_len: 1, max_len:  32}];   // login user
}

// Request message for VlanAdd
message VlanAddRequest {
  ProductInformation product_info = 1 [(validate.rules).message.required = true];                           // Product information
  NwInformation switch_info       = 2 [(validate.rules).message.required = true];                           // network switch information
  string interface_name           = 3 [(validate.rules).string = {min_len: 1, max_len: 32}];                // physical interface name
  string vlan_type                = 4 [(validate.rules).string = {min_len: 1, max_len:  5}];                // type of vlan(Port or Trunk)
  optional int32 vlan_id          = 5 [(validate.rules).int32.gte = 1, (validate.rules).int32.lte =  4094]; // vlan id
  optional string extra_parameter = 6;                                                                      // Product extension parameters
}

// Response message for VlanAdd
message VlanAddReply {
  optional common.ResultCode result = 1;    // result of command (SUCCESS or ERROR)
  string error_message = 2;          // error message
}

// Request message for VlanDelete
message VlanDeleteRequest {
  ProductInformation product_info = 1 [(validate.rules).message.required = true];                           // Product information
  NwInformation switch_info       = 2 [(validate.rules).message.required = true];                           // network switch information
  string interface_name           = 3 [(validate.rules).string = {min_len: 1, max_len: 32}];                // physical interface name
  optional int32 vlan_id          = 4 [(validate.rules).int32.gte = 1, (validate.rules).int32.lte =  4094]; // vlan id
  optional string extra_parameter = 5;                                                                      // Product extension parameters
}

// Response message for VlanDelete
message VlanDeleteReply {
  optional common.ResultCode result = 1;    // result of command (SUCCESS or ERROR)
  string error_message = 2;          // error message
}

// Request message for VswVlanAdd
message VswVlanAddRequest {
  ProductInformation product_info = 1 [(validate.rules).message.required = true];                           // Product information
  NwInformation host_info         = 2 [(validate.rules).message.required = true];                           // host information
  optional int32 vlan_id          = 3 [(validate.rules).int32.gte = 1, (validate.rules).int32.lte =  4094]; // vlan id
  string if_name                  = 4 [(validate.rules).string = {min_len: 1, max_len: 7}];                 // physical interface name
  optional string extra_parameter = 5;                                                                      // Product extension parameters
}

// Response message for VswVlanAdd
message VswVlanAddReply {
  optional common.ResultCode result = 1;    // result of command (SUCCESS or ERROR)
  string error_message = 2;          // error message
}

// Request message for VswVlanDelete
message VswVlanDeleteRequest {
  ProductInformation product_info = 1 [(validate.rules).message.required = true];                           // Product information
  NwInformation host_info         = 2 [(validate.rules).message.required = true];                           // host information
  optional int32 vlan_id          = 3 [(validate.rules).int32.gte = 1, (validate.rules).int32.lte =  4094]; // vlan id
  string if_name                  = 4 [(validate.rules).string = {min_len: 1, max_len: 7}];                 // physical interface name
  optional string extra_parameter = 5;                                                                      // Product extension parameters
}

// Response message for VswVlanDelete
message VswVlanDeleteReply {
  optional common.ResultCode result = 1;    // result of command (SUCCESS or ERROR)
  string error_message = 2;          // error message
}
