syntax = "proto3";

package protocdi;

import "validate/validate.proto";
import "common/api/proto/common_interface.proto";

// Package for go
option go_package = "cdi_module/api/proto;protocdi";

// Enum for detail error code
enum DetailCode {
  ZERO = 0;
	IF_PARAMETER_INVALID    = 41;
	UNSUPPORT_PRODUCT       = 42;
	CDI_ENVIRONMENT_ERROR   = 61;
	CDI_COMMAND_ERROR_V_1_0 = 71;
	CDI_COMMAND_ERROR_V_1_1 = 72;
	CDI_RESPONSE_INVALID    = 81;
}

// Define service for CDI
service Cdi {
  rpc MachineCreate (MachineCreateRequest) returns (MachineCreateReply) {}
  rpc MachineDestroy (MachineDestroyRequest) returns (MachineDestroyReply) {}
  rpc MachineShow (MachineShowRequest) returns (MachineShowReply) {}
  rpc ResourceList (ResourceListRequest) returns (ResourceListReply) {}
  rpc ResourceShow (ResourceShowRequest) returns (ResourceShowReply) {}
  rpc CardScaling (CardScalingRequest) returns (CardScalingReply) {}
}

// message of Product information
message ProductInformation {
  string vendor       = 1 [(validate.rules).string = {min_len: 1, max_len: 128}];   // vendor name
  string product_name = 2 [(validate.rules).string = {min_len: 1, max_len: 128}];   // product name
  string version      = 3 [(validate.rules).string = {min_len: 1, max_len: 128}];   // version
  optional string os  = 4 [(validate.rules).string = {min_len: 1, max_len: 128}];   // os info
}

// message of CDI information
message CdiInformation {
  string remote_host      = 1 [(validate.rules).string = {min_len: 1, max_len: 128}];   // host name or ip address
  string remote_user      = 2 [(validate.rules).string = {min_len: 1, max_len:  32}];   // login user
}

// message of Resource Modify Requests
message ResourceModifyRequests {
  string op            = 1 [(validate.rules).string = {min_len: 1, max_len:  6}];   // operation type
  string resource_name = 2 [(validate.rules).string = {min_len: 1, max_len: 32}];   // resource name
}

// Request message for MachineCreate
message MachineCreateRequest {
  ProductInformation product_info = 1 [(validate.rules).message.required = true];               // Product information
  CdiInformation cdi_info         = 2 [(validate.rules).message.required = true];               // CDI information
  string group_name               = 3 [(validate.rules).string   = {min_len: 1, max_len: 32}];  // group name
  string machine_name             = 4 [(validate.rules).string   = {min_len: 1, max_len: 22}];  // machine name
  repeated string resource_list   = 5 [(validate.rules).repeated = {min_items: 1, items: {string: {min_len: 1, max_len: 128}}}];  // resource list
  optional string extra_parameter = 6;    // Product extension parameters
}

// Response message for MachineCreate
message MachineCreateReply {
  optional common.ResultCode result = 1;     // result of command (Accept or Error)
  string error_message = 2;           // error message
}

// Request message for MachineDestroy
message MachineDestroyRequest {
  ProductInformation product_info = 1 [(validate.rules).message.required = true];               // Product information
  CdiInformation cdi_info         = 2 [(validate.rules).message.required = true];               // CDI information
  string group_name               = 3 [(validate.rules).string   = {min_len: 1, max_len: 32}];  // group name
  string machine_name             = 4 [(validate.rules).string   = {min_len: 1, max_len: 22}];  // machine name
  optional string extra_parameter = 5;    // Product extension parameters
}

// Response message for MachineDestroy
message MachineDestroyReply {
  optional common.ResultCode result = 1;     // result of command (Accept or Error)
  string error_message = 2;           // error message
}

// Request message for MachineShow
message MachineShowRequest {
  ProductInformation product_info = 1 [(validate.rules).message.required = true];               // Product information
  CdiInformation cdi_info         = 2 [(validate.rules).message.required = true];               // CDI information
  string group_name               = 3 [(validate.rules).string   = {min_len: 1, max_len: 32}];  // group name
  string machine_name             = 4 [(validate.rules).string   = {min_len: 1, max_len: 22}];  // machine name
  optional string extra_parameter = 5;    // Product extension parameters
}

// Response message for MachineShow
message MachineShowReply {
  optional common.ResultCode result = 1;     // result of command (Success or Error)
  string error_message = 2;           // error message
  string data = 3;                    // machine info(JSON string)
}

// Request message for ResourceList
message ResourceListRequest {
  ProductInformation product_info = 1 [(validate.rules).message.required = true];               // Product information
  CdiInformation cdi_info         = 2 [(validate.rules).message.required = true];               // CDI information
  string group_name               = 3 [(validate.rules).string   = {min_len: 1, max_len: 32}];  // group name
  optional string extra_parameter = 4;    // Product extension parameters
}

// Response message for ResourceList
message ResourceListReply {
  optional common.ResultCode result = 1;     // result of command (Success or Error)
  string error_message = 2;           // error message
  string data = 3;                    // resource list info(JSON string)
}

// Request message for ResourceShow
message ResourceShowRequest {
  ProductInformation product_info = 1 [(validate.rules).message.required = true];               // Product information
  CdiInformation cdi_info         = 2 [(validate.rules).message.required = true];               // CDI information
  string resource_name            = 3 [(validate.rules).string   = {min_len: 1, max_len: 32}];  // resource name
  optional string extra_parameter = 4;    // Product extension parameters
}

// Response message for ResourceShow
message ResourceShowReply {
  optional common.ResultCode result = 1;     // result of command (Success or Error)
  string error_message = 2;           // error message
  string data = 3;                    // resource info(JSON string)
}

// Request message for CardScaling
message CardScalingRequest {
  ProductInformation product_info = 1 [(validate.rules).message.required = true];               // Product information
  CdiInformation cdi_info         = 2 [(validate.rules).message.required = true];               // CDI information
  string group_name               = 3 [(validate.rules).string   = {min_len: 1, max_len: 32}];  // group name
  string machine_name             = 4 [(validate.rules).string   = {min_len: 1, max_len: 22}];  // machine name
  repeated ResourceModifyRequests resource_modify_requests = 5 [(validate.rules).repeated = {min_items: 1}];  // Resources for modify
  optional string extra_parameter = 6;    // Product extension parameters
}

// Response message for CardScaling
message CardScalingReply {
  optional common.ResultCode result = 1;     // result of command (Accept or Error)
  string error_message = 2;           // error message
}
